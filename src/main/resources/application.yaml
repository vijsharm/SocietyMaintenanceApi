spring:
  application:
    name: societymaintenance

  datasource:
    url: jdbc:h2:mem:societydb
    driver-class-name: org.h2.Driver
    username: sa
    password:

    h2:
      console:
        enabled: true
        path: /h2-console

    jpa:
      database-platform: org.hibernate.dialect.H2Dialect
      hibernate:
        ddl-auto: update   # create | create-drop | update | validate
      show-sql: true
      properties:
        hibernate:
          format_sql: true
